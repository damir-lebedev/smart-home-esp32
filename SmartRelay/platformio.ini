[env:adafruit_qtpy_esp32c3]
platform = espressif32
board = esp32-c3-m1i-kit
framework = arduino
lib_extra_dirs = ~/Documents/Arduino/libraries
lib_deps = 
	esp32async/ESPAsyncWebServer@^3.10.0
	bblanchon/ArduinoJson@7.4.2
